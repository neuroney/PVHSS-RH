# ============================================================
# PVHSS-RH Benchmark Configuration
# ============================================================
# All scripts (runall.sh, run_microbenchmarks.sh, etc.)
# read from this file.  Edit values, then run.
#
# Usage:
#   source bench.conf
#   ./runall.sh
#   ./benchmarks/micro/run_microbenchmarks.sh
# ============================================================

# --- Build ---------------------------------------------------
BUILD_DIR="${BUILD_DIR:-build}"
BUILD_TYPE="${BUILD_TYPE:-Release}"
JOBS="${JOBS:-$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 4)}"
SKIP_BUILD="${SKIP_BUILD:-0}"

# --- Micro-benchmark -----------------------------------------
# cheap  = fast ops (AddMemory, PRF, etc.)
# expensive = heavy ops (Enc/OKDM, Multiply/DDec, pairing, etc.)
MICRO_CHEAP_SAMPLES="${MICRO_CHEAP_SAMPLES:-10}"
MICRO_CHEAP_ITERS="${MICRO_CHEAP_ITERS:-1}"
MICRO_EXPENSIVE_SAMPLES="${MICRO_EXPENSIVE_SAMPLES:-1}"
MICRO_EXPENSIVE_ITERS="${MICRO_EXPENSIVE_ITERS:-1}"

# --- Protocol benchmarks -------------------------------------
PROTO_DEGREES="${PROTO_DEGREES:-5,10,15}"
PROTO_SAMPLES="${PROTO_SAMPLES:-1}"
PROTO_MSG_NUM="${PROTO_MSG_NUM:-5}"

# --- Run mode ------------------------------------------------
# full  = micro + protocol + overhead  (default)
# p5    = micro + protocol(degree=5 only) + overhead
# micro   = micro only
# proto   = protocol only
# overhead = overhead only
RUN_MODE="${RUN_MODE:-full}"
